name = "cupel-spike"
version = "0.1.0"
description = "Spike: proves a tool plugin can reach a Solana RPC over wasi:http"
author = "Ace"
wasm_path = "cupel_spike.wasm"
capabilities = ["tool"]
# http_client: the whole point of the spike. No tool plugin in the repo has ever
# declared it; the host grants it via runtime.rs::create_plugin -> with_granted_http().
# config_read: the host injects rpc_url into execute args as `__config`, and
# strips any caller-supplied `__config` first so the model cannot spoof it.
permissions = ["http_client", "config_read"]
registry = false
